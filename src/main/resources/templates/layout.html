<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, body, scripts)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">🏪 Quản lý phân phối sản phẩm</title>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <!-- Chart.js (cho trang thống kê) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- Fixed Header Section -->
<header class="fixed-header">
    <!-- Row 1: App Title & User Info -->
    <div class="top-bar d-flex align-items-center justify-content-between">
        <div class="logo-area">
            <i class="fas fa-store"></i>
            <h1 th:with="auth=${#authentication?.name}"
                th:text="${#authorization.expression('hasRole(''ROLE_ADMIN'')') ? 'Hệ thống Quản trị' : 'Cửa hàng Phân phối'}">Hệ thống quản lý phân phối</h1>
        </div>
        
        <!-- Search bar -->
        <th:block th:if="${#authorization.expression('hasRole(''ROLE_CUSTOMER'')')}">
            <form action="/products/search" method="get" class="d-none d-md-flex mx-4" style="flex: 1; max-width: 500px; position: relative;">
                <div class="input-group input-group-lg shadow-sm" style="border-radius: 30px;">
                    <span class="input-group-text bg-white border-end-0 text-muted" style="border-top-left-radius: 30px; border-bottom-left-radius: 30px;">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" name="keyword" id="searchInput" class="form-control border-start-0 border-end-0 shadow-none fs-6" 
                           placeholder="Tìm tên sản phẩm, danh mục..." autocomplete="off">
                    <button class="btn btn-primary px-4 fw-bold" type="submit" style="border-top-right-radius: 30px; border-bottom-right-radius: 30px;">TÌM</button>
                </div>
                <!-- Suggestion box -->
                <div id="search-suggestions" class="position-absolute w-100 bg-white shadow-lg rounded-4 overflow-hidden border mt-1" 
                     style="top: 100%; z-index: 1050; display: none;"></div>
            </form>
        </th:block>

        <div class="user-profile">
            <span class="badge"
                  th:classappend="${#authorization.expression('hasRole(''ROLE_ADMIN'')') ? 'bg-danger' : 'bg-success'}">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication?.name}">user</span>
                <small th:text="${#authorization.expression('hasRole(''ROLE_ADMIN'')') ? ' (Admin)' : ' (Khách)'}"></small>
            </span>
            <a href="/logout" class="text-white text-decoration-none" title="Đăng xuất">
                <i class="fas fa-sign-out-alt"></i>
            </a>
        </div>
    </div>

    <!-- Row 2: Navigation Menu -->
    <nav class="main-nav">
        <a href="/home" class="nav-item" id="nav-home">
            <i class="fas fa-home"></i>
            <span th:text="${#authorization.expression('hasRole(''ROLE_ADMIN'')') ? 'Home' : 'Trang chủ'}"></span>
        </a>
        <a href="/products" class="nav-item" id="nav-products">
            <i class="fas fa-boxes"></i> Sản phẩm
        </a>
        <a href="/cart" class="nav-item" id="nav-cart">
            <i class="fas fa-shopping-cart"></i> Giỏ hàng
        </a>

        <!-- CHỈ ADMIN -->
        <th:block th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'')')}">
            <a href="/orders" class="nav-item" id="nav-orders">
                <i class="fas fa-truck"></i> Đơn hàng
            </a>
            <a href="/stats" class="nav-item" id="nav-stats">
                <i class="fas fa-chart-line"></i> Thống kê
            </a>
        </th:block>

        <!-- CHỈ CUSTOMER -->
        <th:block th:if="${#authorization.expression('hasRole(''ROLE_CUSTOMER'')')}">
            <a href="/orders" class="nav-item" id="nav-orders-my">
                <i class="fas fa-history"></i> Đơn của tôi
            </a>
        </th:block>

        <a href="/promo" class="nav-item" id="nav-promo">
            <i class="fas fa-gift"></i> Khuyến mãi
        </a>
    </nav>
</header>

<!-- Main Content Area -->
<main class="main-container">
    <th:block th:replace="${body}"></th:block>
</main>

<!-- Footer -->
<div class="footer">
    <p>&copy; 2026 - <span th:text="${#authorization.expression('hasRole(''ROLE_ADMIN'')') ? 'Bảng quản trị' : 'Cửa hàng trực tuyến'}">Hệ thống</span> | Dự án Phân phối</p>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Logic highlight active menu
    document.addEventListener("DOMContentLoaded", function() {
        const path = window.location.pathname;
        const navItems = document.querySelectorAll(".nav-item");
        navItems.forEach(item => {
            const href = item.getAttribute("href");
            if (path === href || (href !== "/home" && path.startsWith(href))) {
                item.classList.add("active");
            }
        });
        
        // Logic Autocomplete Search
        const searchInput = document.getElementById('searchInput');
        const suggestBox = document.getElementById('search-suggestions');
        let suggestTimeout = null;

        if (searchInput && suggestBox) {
            searchInput.addEventListener('input', function(e) {
                clearTimeout(suggestTimeout);
                const q = e.target.value.trim();
                
                if (q.length < 2) {
                    suggestBox.style.display = 'none';
                    return;
                }
                
                suggestTimeout = setTimeout(() => {
                    fetch(`/products/api/suggest?q=${encodeURIComponent(q)}`)
                        .then(res => res.json())
                        .then(data => {
                            if (data.length > 0) {
                                let html = '<ul class="list-group list-group-flush m-0">';
                                data.forEach(p => {
                                    const img = p.imageUrl ? p.imageUrl : '/images/default.jpg';
                                    const priceHtml = p.discountedPrice < p.price 
                                        ? `<span class="text-danger fw-bold">${p.discountedPrice.toLocaleString()}đ</span> <small class="text-muted text-decoration-line-through ms-1" style="font-size:0.75rem">${p.price.toLocaleString()}đ</small>`
                                        : `<span class="text-primary fw-bold">${p.price.toLocaleString()}đ</span>`;
                                        
                                    html += `<li class="list-group-item list-group-item-action px-3 py-2 border-bottom">
                                        <a href="/products/${p.id}" class="d-flex align-items-center text-decoration-none text-dark">
                                            <img src="${img}" style="width: 45px; height: 45px; object-fit: cover" class="rounded-3 shadow-sm me-3 border">
                                            <div class="flex-grow-1 overflow-hidden">
                                                <div class="fw-bold mb-1 text-truncate" style="font-size:0.95rem;">${p.name}</div>
                                                <div style="font-size:0.85rem">${priceHtml}</div>
                                            </div>
                                        </a>
                                    </li>`;
                                });
                                html += '</ul>';
                                suggestBox.innerHTML = html;
                                suggestBox.style.display = 'block';
                            } else {
                                suggestBox.innerHTML = '<div class="p-3 text-center text-muted small"><i class="fas fa-search-minus mb-2 fs-5"></i><br>Không tìm thấy sản phẩm gợi ý</div>';
                                suggestBox.style.display = 'block';
                            }
                        }).catch(err => {
                            console.error('Lỗi khi fetch suggest:', err);
                        });
                }, 300); // delay 300ms
            });

            // Hide suggestions when clicking outside
            document.addEventListener('click', function(e) {
                if (!searchInput.contains(e.target) && !suggestBox.contains(e.target)) {
                    suggestBox.style.display = 'none';
                }
            });
        }
    });
</script>
<th:block th:replace="${scripts}"></th:block>
</body>
</html>
