<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::.container}, ~{})}">
<head>
    <title>Quản lý đơn hàng</title>
</head>
<body>
    <div class="container">
        <div class="card-custom">
            <h2><i class="fas fa-truck"></i> Danh sách đơn hàng</h2>
            <hr>
            
            <table class="table-custom table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên sản phẩm</th>
                        <th>Số lượng</th>
                        <th>Giá</th>
                        <th>Người mua</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${listOrders}">
                        <td th:text="${o.id}"></td>
                        <td th:text="${o.productName}"></td>
                        <td th:text="${o.quantity}"></td>
                        <td th:text="${#numbers.formatDecimal(o.price, 1, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        <td th:text="${o.user != null ? o.user.username : 'Ẩn danh'}"></td>
                        <td>
                            <a th:href="@{'/orders/delete/' + ${o.id}}" class="btn btn-danger btn-sm" onclick="return confirm('Xóa?')">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div th:if="${listOrders == null or listOrders.empty}" class="alert alert-info text-center">
                <i class="fas fa-info-circle"></i> Chưa có đơn hàng nào!
            </div>
        </div>
    </div>
</body>
</html>
