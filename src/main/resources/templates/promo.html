<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::.container}, ~{})}">
<head>
    <title>Khuyến mãi</title>
</head>
<body>
    <div class="container">
        <div class="card-custom">
            <h2><i class="fas fa-gift"></i> Quản lý mã khuyến mãi</h2>
            <hr>
            
            <div class="row">
                <div class="col-md-5 mb-4">
                    <form th:action="@{/promo/save}" th:object="${promo}" method="post" class="p-4 border rounded bg-white shadow-sm">
                        <input type="hidden" th:field="*{id}">
                        <h4 class="mb-3 text-primary" th:text="${promo.id != null ? 'Cập nhật mã' : 'Tạo mã mới'}">Tạo mã mới</h4>
                        <div class="mb-3">
                            <label class="form-label">Tên chương trình *</label>
                            <input type="text" th:field="*{ten}" class="form-control" placeholder="VD: Giảm giá mùa hè" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mã code</label>
                            <input type="text" th:field="*{code}" class="form-control" placeholder="VD: SUMMER2026">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phần trăm giảm *</label>
                            <div class="input-group">
                                <input type="number" th:field="*{discount}" step="0.1" class="form-control" placeholder="10" required>
                                <span class="input-group-text">%</span>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-plus-circle"></i> Kích hoạt ngay
                        </button>
                    </form>
                </div>
                
                <!-- Danh sách thật -->
                <div class="col-md-7">
                    <h4 class="mb-3"><i class="fas fa-list-ul"></i> Danh sách mã khuyến mãi</h4>
                    <ul class="list-group list-group-flush shadow-sm rounded">
                        <li th:each="km : ${listPromo}" class="list-group-item d-flex justify-content-between align-items-center">
                            <div>
                                <strong class="text-primary" th:text="${km.code != null and !km.code.isEmpty() ? km.code : 'MÃ KHÔNG TÊN'}">MÃ CODE</strong>
                                <div class="small text-muted" th:text="${km.ten} + ' - Giảm ' + ${km.discount} + '%'">Thông tin chương trình</div>
                            </div>
                            <div>
                                <span class="badge bg-success rounded-pill me-2">Đang chạy</span>
                                <a th:href="@{'/promo/edit/' + ${km.id}}" class="btn btn-sm btn-outline-primary" title="Sửa"><i class="fas fa-edit"></i></a>
                                <a th:href="@{'/promo/delete/' + ${km.id}}" class="btn btn-sm btn-outline-danger" title="Xóa" onclick="return confirm('Bạn có chắc muốn xóa mã này?')"><i class="fas fa-trash"></i></a>
                            </div>
                        </li>
                        <li th:if="${listPromo == null or listPromo.isEmpty()}" class="list-group-item text-center text-muted py-4">
                            <i class="fas fa-folder-open mb-2 fa-2x"></i><br>
                            Chưa có mã khuyến mãi nào được tạo.
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
