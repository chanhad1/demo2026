<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::.container}, ~{})}">
<head>
    <title>Giỏ hàng</title>
</head>
<body>
    <div class="container">
        <div class="card-custom">
            <h2><i class="fas fa-shopping-cart"></i> Giỏ hàng của bạn</h2>
            <hr>
            
            <div th:if="${cart == null or cart.empty}" class="alert alert-warning text-center">
                <i class="fas fa-info-circle"></i> Giỏ hàng hiện đang trống! 
                <a href="/products" class="alert-link">Quay lại mua sắm</a>
            </div>
            
            <div th:if="${cart != null and !cart.empty}">
                <table class="table table-custom">
                    <thead>
                        <tr>
                            <th>Tên sản phẩm</th>
                            <th>Giá</th>
                            <th>Số lượng</th>
                            <th>Thành tiền</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cart}">
                            <td th:text="${item.name}"></td>
                            <td th:text="${#numbers.formatDecimal(item.price, 1, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            <td th:text="${item.quantity}"></td>
                            <td th:text="${#numbers.formatDecimal(item.price * item.quantity, 1, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            <td>
                                <form th:action="@{/cart/remove}" method="post" style="display:inline;">
                                    <input type="hidden" name="name" th:value="${item.name}">
                                    <button type="submit" class="btn btn-danger btn-sm">
                                        <i class="fas fa-trash"></i> Xóa
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="3" class="text-end fw-bold">Tổng cộng:</td>
                            <td colspan="2" class="text-danger fw-bold" th:text="${#numbers.formatDecimal(total, 1, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        </tr>
                    </tfoot>
                </table>
                
                <div class="text-end mt-4">
                    <a href="/products" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Tiếp tục mua sắm
                    </a>
                    <form th:action="@{/orders/checkout}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-check-circle"></i> Thanh toán ngay
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
