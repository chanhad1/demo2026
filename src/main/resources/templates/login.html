<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Quản lý phân phối</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            border: none;
        }
        .login-header {
            background: #ffffff;
            color: #1565c0;
            padding: 40px 30px 20px 30px;
            text-align: center;
        }
        .login-body {
            padding: 20px 40px 40px 40px;
        }
        .btn-login {
            background: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30,136,229,0.4);
            background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #dee2e6;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(30,136,229,0.1);
            border-color: #1e88e5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="login-card">
                    <div class="login-header">
                        <i class="fas fa-shipping-fast fa-3x"></i>
                        <h3 class="mt-3">Hệ thống Phân phối</h3>
                        <p class="mb-0">Đăng nhập để tiếp tục</p>
                    </div>
                    <div class="login-body">
                        <!-- Hiển thị lỗi từ Spring Security -->
                        <div th:if="${param.error}" class="alert alert-danger">
                            <i class="fas fa-exclamation-triangle"></i> Sai tên đăng nhập hoặc mật khẩu!
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success">
                            <i class="fas fa-info-circle"></i> Bạn đã đăng thoát thành công.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label"><i class="fas fa-user"></i> Tên đăng nhập</label>
                                <input type="text" name="username" class="form-control" placeholder="Nhập username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label"><i class="fas fa-lock"></i> Mật khẩu</label>
                                <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
                            </div>
                            <button type="submit" class="btn btn-login w-100 text-white">
                                <i class="fas fa-sign-in-alt"></i> Đăng nhập
                            </button>
                        </form>
                        <hr>
                        <div class="text-center">
                            <p>Chưa có tài khoản? <a href="/register">Đăng ký ngay</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
