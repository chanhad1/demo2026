<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::.container}, ~{::scripts})}">
<head>
    <title>Danh sách sản phẩm - Cửa hàng</title>
</head>
<body>
    <div class="container">
        <!-- Dashboard title area -->
        <div class="page-header" style="margin-bottom: 30px; border-left: 5px solid #1e88e5; padding-left: 15px;">
            <h2 class="fw-bold mb-1">Tất cả sản phẩm</h2>
            <p class="text-muted mb-0">Khám phá danh mục hàng hóa đa dạng của chúng tôi.</p>
        </div>

        <!-- Grid Layout -->
        <!-- Custom gap of 20px across the grid -->
        <div class="row" style="gap: 20px; justify-content: flex-start; margin-left: 0; margin-right: 0;">
            <!-- Adjust width using custom calc to account for gap exactly -->
            <!-- We will use standard Bootstrap columns that automatically wrap instead to avoid breaking responsiveness -->
            <!-- Wait, combining Bootstrap cols with CSS flex gap can break layout width if not careful -->
            <!-- The standard Bootstrap way for 20px gap is g-4 (1.5rem = 24px) which is close enough and safe, or a custom class -->
        </div>
        
        <!-- Safest responsive custom grid layout matching 1, 2, 3, 4 columns with exactly 20px gap -->
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
            <div th:each="sp : ${listSanPham}">
                <div class="product-card-shop">
                    <!-- Promo Badge -->
                    <div th:if="${sp.khuyenMai != null}" class="promo-badge-shop">
                        <i class="fas fa-percent"></i> Giảm <span th:text="${#numbers.formatDecimal(sp.khuyenMai.discount, 0, 0)}"></span>%
                    </div>
                    
                    <a th:href="@{'/products/' + ${sp.id}}" style="display: block; text-decoration: none; color: inherit;">
                        <img th:src="${sp.imageUrl != null ? sp.imageUrl : '/images/default.jpg'}" 
                             class="product-img-shop" 
                             onerror="this.src='/images/default.jpg'"
                             alt="Sản phẩm">
                    </a>
                    
                    <div class="product-info-shop d-flex flex-column" style="height: 100%;">
                        <a th:href="@{'/products/' + ${sp.id}}" style="text-decoration: none; color: inherit;">
                            <h5 class="product-name" th:title="${sp.name}" th:text="${sp.name}" style="height: 48px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">Tên sản phẩm</h5>
                        </a>
                        
                        <!-- Price section -->
                        <div class="mb-3 mt-auto">
                            <th:block th:if="${sp.khuyenMai != null}">
                                <span class="price-old" style="font-size: 0.9rem;" th:text="${#numbers.formatDecimal(sp.price, 1, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                <span class="price-new" style="font-size: 1.1rem; color: #e53935;" th:text="${#numbers.formatDecimal(sp.getDiscountedPrice(), 1, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            </th:block>
                            <th:block th:if="${sp.khuyenMai == null}">
                                <span class="price-new" style="font-size: 1.1rem; color: #1e88e5;" th:text="${#numbers.formatDecimal(sp.price, 1, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            </th:block>
                        </div>

                        <!-- Add to Cart / View Detail Buttons -->
                        <div class="d-flex gap-2 w-100">
                            <button class="btn btn-outline-primary flex-grow-1 rounded-pill" th:onclick="'window.location.href=\'/cart/add/' + ${sp.id} + '\''">
                                <i class="fas fa-cart-plus"></i> Giỏ
                            </button>
                            <a th:href="@{'/products/' + ${sp.id}}" class="btn btn-primary flex-grow-1 rounded-pill">
                                Chi tiết <i class="fas fa-arrow-right ms-1"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            
            <div th:if="${listSanPham == null or listSanPham.empty}" style="grid-column: 1 / -1; text-align: center; padding: 40px 0;">
                <div class="card-custom" style="display:inline-block; padding:40px;">
                    <i class="fas fa-search-minus fa-4x text-light mb-3"></i>
                    <h3>Không tìm thấy sản phẩm nào</h3>
                    <p class="text-muted">Chúng tôi sẽ sớm bổ sung thêm hàng hóa mới.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Functions -->
    <th:block th:fragment="scripts">
        <script>
            function updateQty(id, delta) {
                const input = document.getElementById('qty-' + id);
                let val = parseInt(input.value) || 1;
                val += delta;
                if (val < 1) val = 1;
                if (val > 99) val = 99;
                input.value = val;
            }

            function handleAddToCart(id) {
                const qty = document.getElementById('qty-' + id).value;
                window.location.href = `/cart/add/${id}?qty=${qty}`;
            }
        </script>
    </th:block>
</body>
</html>
